name: Instrumented Tests

# Emulator-backed connected tests are slow and occasionally flaky, so they do not gate every
# pull request. They run on a nightly schedule, on demand, and — via workflow_call — as a
# release gate (see release.yml). Unit tests still run on every push/PR in ci.yml.
on:
  schedule:
    - cron: '0 4 * * *'   # nightly, 04:00 UTC
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

# A newer run for the same ref supersedes an in-flight one; releases (tag refs) are never cancelled.
concurrency:
  group: instrumented-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  instrumented:
    name: Instrumented (API ${{ matrix.api-level }})
    # Pinned to 22.04: on the ubuntu-24.04 runner image the AVD never finishes booting (the
    # device stays "offline" and getprop sys.boot_completed loops), an android-emulator-runner
    # regression that was failing every nightly/release-gate run. 22.04 boots the AVD reliably.
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        api-level: [34]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Hardware acceleration: the emulator is unusably slow on the runner without /dev/kvm.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run instrumented tests (full debug)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          target: google_apis
          profile: pixel_6
          ram-size: 4096M
          cores: 4
          emulator-boot-timeout: 900
          disable-animations: true
          # androidTest is a single flavor-shared source set; it runs against the full
          # debug variant — the shipped flavor — now that play is deprecated.
          script: ./gradlew connectedFullDebugAndroidTest

      - name: Upload instrumented test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: instrumented-results-api${{ matrix.api-level }}
          path: app/build/reports/androidTests/
