name: Release

on:
  push:
    tags:
      - 'v*'

# Default to least-privilege at the workflow level. The `release` job below
# overrides this to `contents: write` for the GitHub Release upload step.
permissions:
  contents: read

jobs:
  # Mirror of the Release Gate check that runs on every push to main: confirms the
  # commits between the prior tag and this one include a release-prefixed subject,
  # plus that version.properties + a matching fastlane changelog landed together.
  # Inlined here (rather than just relying on the standalone Release Gate workflow)
  # so a failed gate actually blocks the artifact build — the standalone workflow
  # is advisory and runs in parallel to other on-main triggers; this one is
  # `needs:`-blocking for build + release.
  gate:
    name: Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Determine compare range
        id: range
        run: |
          # "Previous tag" = most-recent tag strictly older than the current one.
          # `git describe --tags --abbrev=0 HEAD^` walks back from HEAD's parent and
          # finds the nearest annotated tag — exactly the prior release boundary.
          # Falls back to the root commit if no prior tag exists (first release).
          if prev=$(git describe --tags --abbrev=0 "${GITHUB_SHA}^" 2>/dev/null); then
            base="$prev"
          else
            base=$(git rev-list --max-parents=0 HEAD | head -1)
            echo "No prior tag found; falling back to root commit ($base)."
          fi
          echo "base=$base" >> "$GITHUB_OUTPUT"
          echo "head=$GITHUB_SHA" >> "$GITHUB_OUTPUT"
          echo "Comparing $base..$GITHUB_SHA"

      - name: Detect release-related file changes
        id: detect
        run: |
          base="${{ steps.range.outputs.base }}"
          head="${{ steps.range.outputs.head }}"
          changed=$(git diff --name-only "$base" "$head")
          version_touched=false
          changelog_touched=false
          if echo "$changed" | grep -qx "app/version.properties"; then
            version_touched=true
          fi
          if echo "$changed" | grep -qE "^fastlane/metadata/android/[^/]+/changelogs/[0-9]+\.txt$"; then
            changelog_touched=true
          fi
          echo "version_touched=$version_touched" >> "$GITHUB_OUTPUT"
          echo "changelog_touched=$changelog_touched" >> "$GITHUB_OUTPUT"

      - name: Require release-prefixed commit
        if: steps.detect.outputs.version_touched == 'true' || steps.detect.outputs.changelog_touched == 'true'
        run: |
          base="${{ steps.range.outputs.base }}"
          head="${{ steps.range.outputs.head }}"
          subjects=$(git log --format=%s "$base..$head")
          echo "Commit subjects in range:"
          echo "$subjects"
          # Accept both styles — see .github/workflows/release-gate.yml for the rationale.
          if echo "$subjects" | grep -qiE '^release(\([^)]+\))?:|^release[[:space:]]+v?[0-9]+\.[0-9]+(\.[0-9]+)?:'; then
            echo "Found release-prefixed commit — gate satisfied."
            exit 0
          fi
          echo "::error::Release-related files were modified between $base and this tag, but no commit subject starts with 'release:' or 'release vX.Y.Z:'."
          echo "::error::Either retitle the version-bump commit and re-tag, or revert the unintended release-file change."
          exit 1

      - name: Ensure version bump and changelog stay in sync
        if: steps.detect.outputs.version_touched == 'true' || steps.detect.outputs.changelog_touched == 'true'
        run: |
          head="${{ steps.range.outputs.head }}"
          version_touched="${{ steps.detect.outputs.version_touched }}"
          changelog_touched="${{ steps.detect.outputs.changelog_touched }}"
          if [ "$version_touched" = "true" ] && [ "$changelog_touched" = "false" ]; then
            new_code=$(git show "$head:app/version.properties" | sed -n 's/^versionCode=\(.*\)$/\1/p')
            echo "::error::app/version.properties bumped to versionCode=$new_code but no fastlane changelog was added in this range."
            exit 1
          fi
          if [ "$version_touched" = "false" ] && [ "$changelog_touched" = "true" ]; then
            echo "::error::A fastlane changelog was added/modified, but app/version.properties was not bumped."
            exit 1
          fi
          echo "Version + changelog in sync."

  # Tests must pass before a signed artifact is ever built. Unit tests are the fast, reliable
  # primary blocker; the instrumented suite (reused from instrumented-tests.yml) is the
  # emulator-backed release gate. A red test here stops the build + publish jobs below.
  unit-tests:
    name: Unit Tests (${{ matrix.flavorName }})
    needs: gate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Full only: the deprecated, unshipped play flavor must not be able to block a
          # release. Its compile-and-unit-test signal lives in ci.yml on every push/PR.
          - flavorName: Full
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew test${{ matrix.flavorName }}DebugUnitTest

  instrumented-tests:
    name: Instrumented Tests
    needs: gate
    uses: ./.github/workflows/instrumented-tests.yml

  # Lint the actual shipped release variant before signing. It passes against the committed
  # lint-baseline.xml (warningsAsErrors is off, so only un-baselined errors fail the build);
  # this stops a release-only lint regression from reaching a signed artifact.
  lint:
    name: Lint (release)
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Lint release variant
        run: ./gradlew lintFullRelease

  build:
    name: Build ${{ matrix.flavorName }} Release
    needs: [gate, unit-tests, instrumented-tests, lint]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # The Google Play build is no longer published. The `play` build flavor stays in the
          # source (still debug-compiled + unit-tested in ci.yml) so it can be revived, but it
          # is no longer built, signed, released, or allowed to gate anything. To revive it:
          #   - re-add here: `- flavor: play / flavorName: Play / gradleTask: bundlePlayRelease /
          #     artifactSrcDir: app/build/outputs/bundle/playRelease /
          #     artifactSrcName: app-play-release.aab / artifactExt: aab`
          #   - re-add `- flavorName: Play` to the unit-tests matrix above
          #   - widen the publish job's `files:` glob below (it only attaches fauxx-full-*.apk;
          #     an unmatched AAB would be dropped silently)
          #   - restore the play quality gates in ci.yml (lint/coverage) if it ships again
          - flavor: full
            flavorName: Full
            gradleTask: assembleFullRelease
            artifactSrcDir: app/build/outputs/apk/full/release
            artifactSrcName: app-full-release.apk
            artifactExt: apk

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > app/release.keystore

      - name: Build ${{ matrix.flavorName }} artifact
        env:
          KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          ./gradlew ${{ matrix.gradleTask }} \
            -Pandroid.injected.signing.store.file="$GITHUB_WORKSPACE/app/release.keystore" \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      - name: Rename artifact
        run: |
          VERSION="${{ github.ref_name }}"
          mv "${{ matrix.artifactSrcDir }}/${{ matrix.artifactSrcName }}" \
             "${{ matrix.artifactSrcDir }}/fauxx-${{ matrix.flavor }}-${VERSION}.${{ matrix.artifactExt }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.flavor }}
          path: ${{ matrix.artifactSrcDir }}/fauxx-${{ matrix.flavor }}-*.${{ matrix.artifactExt }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          merge-multiple: true
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: "Fauxx ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            artifacts/fauxx-full-*.apk
