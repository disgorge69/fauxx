# Kover coverage ratchet floor — hand-maintained, never machine-written.
#
# line.coverage.min is the minimum overall line-coverage percentage (whole number) that
# koverVerifyPlayDebug enforces over hand-written code (generated code + Compose UI screens are
# excluded; see the kover {} block in build.gradle.kts). The gate may only ratchet UP: raise this
# as coverage improves so it can't regress; never lower it to make a red build pass.
# To see current coverage and where the gaps are: ./gradlew koverLogPlayDebug  (or koverHtmlReportPlayDebug)
#
# Bootstrapped at measured-minus-1 (measured 53.7% on the suite that introduced the gate) so the
# gate is green today but blocks any real regression. Raise it as coverage grows.
#
# Ratcheted to 63 after the bulletproof-suite gap-fill (EncryptedFileTree, WebView client/pool,
# ProfileRepository, engine rate-limit, JSInjector, module onActions, ActionDispatcher,
# MockWebServer) raised measured line coverage to 64.7%. Held at measured-minus-1 for headroom.
line.coverage.min=63
