# F-Droid metadata draft for Fauxx (full flavor).
#
# Copy this file into a `fdroiddata` fork at `metadata/com.fauxx.full.yml` and
# open a merge request at https://gitlab.com/fdroid/fdroiddata. F-Droid's
# UpdateCheckMode=Tags + AutoUpdateMode=Version config means new tags on
# https://github.com/digital-grease/fauxx are picked up automatically for
# subsequent releases; the MR is a one-time submission.
#
# This file is a draft — once the MR lands, fdroiddata's copy is canonical.
# Keep this in-repo copy only as reference for future updates.

Categories:
  - Security
  - System

License: AGPL-3.0-only

AuthorName: digital-grease
AuthorEmail: m.flowersbusiness@gmail.com
WebSite: https://github.com/digital-grease/fauxx
SourceCode: https://github.com/digital-grease/fauxx
IssueTracker: https://github.com/digital-grease/fauxx/issues
Donate: https://www.buymeacoffee.com/digitalgrease

AutoName: Fauxx

AntiFeatures:
  NonFreeNet:
    en-US: |-
      Fauxx intentionally generates synthetic browsing activity against
      third-party network services that are not themselves free/libre:
      Google Search, Bing, Yahoo Search, and the user's opted-in ad-preference
      pages (Google Ads Settings, Facebook Ad Preferences) when Layer 2
      targeting is enabled. This traffic is the core feature — the app's
      purpose is to generate noise visible to these non-free services.
      No user credentials are sent except by the user's own opt-in interaction
      with the ad-preference scrapers.

RepoType: git
Repo: https://github.com/digital-grease/fauxx.git

Builds:
  - versionName: 0.2.4
    versionCode: 204
    commit: TBD-after-tag-push
    subdir: app
    gradle:
      - full

# Version is single-sourced from app/version.properties so F-Droid's static parser
# can read it via UpdateCheckData (the gradle file uses a runtime function call,
# which the parser cannot resolve). AutoUpdateMode: Version + UpdateCheckMode: Tags
# means new tags are auto-promoted as long as version.properties is bumped at the tag.
AutoUpdateMode: Version
UpdateCheckMode: Tags
UpdateCheckData: app/version.properties|versionCode=(\d+)|.|versionName=(\S+)
CurrentVersion: 0.2.4
CurrentVersionCode: 204
